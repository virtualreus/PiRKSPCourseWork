services:
  db:
    container_name: hackathon-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${PG_USER:-hackathon}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-hackathon}
      POSTGRES_DB: ${PG_DB:-hackathon}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-hackathon} -d ${PG_DB:-hackathon}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
